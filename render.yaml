# Render Blueprint for the API service. New > Blueprint, point at this repo.
# The GPU worker is NOT deployed here - it runs on RunPod (see worker/README.md).
services:
  - type: web
    name: nerf-service
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # $APP_MODULE picks which file to serve: solution_app (working reference) or app (yours).
    # Switch the env var below to "app" once you've implemented app.py.
    startCommand: uvicorn $APP_MODULE:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Serve the complete reference until you've implemented app.py, then change to "app".
      - key: APP_MODULE
        value: "solution_app"
      - key: NERF_BACKEND
        value: "local"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
