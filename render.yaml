# Render Blueprint for the API service. New > Blueprint, point at this repo.
# The GPU worker is NOT deployed here - it runs on RunPod (see worker/README.md).
services:
  - type: web
    name: nerf-service
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # $APP_MODULE picks which file to serve: app (yours) or solution_app (reference).
    startCommand: uvicorn $APP_MODULE:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: APP_MODULE
        value: "app"
      - key: NERF_BACKEND
        value: "runpod"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: S3_REGION
        value: "auto"            # "auto" for Cloudflare R2
      # Secrets: sync:false means Render prompts for the value in the dashboard and
      # never stores it in this (committed) file.
      - key: RUNPOD_API_KEY
        sync: false
      - key: RUNPOD_ENDPOINT_ID
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false              # R2 endpoint (contains your account id)
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
